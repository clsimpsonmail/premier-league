            document.getElementById('waiver-order').innerHTML = state.waiverOrder.map((n,i)=>`<div class="p-3 bg-slate-900 border border-slate-800 rounded-xl flex justify-between text-[11px] font-black uppercase">#${i+1} <span>${n}</span></div>`).join('');
            document.getElementById('manage-teams-list').innerHTML = state.teams.map((t, i) => `<div class="p-2 bg-slate-900 border border-slate-800 rounded flex justify-between items-center text-[10px] font-black uppercase"><span>${t.name}</span><button onclick="removeTeam(${i})" class="text-red-500">REMOVE</button></div>`).join('');
            document.getElementById('claims-list').innerHTML = state.claims.length ? state.claims.map((c,i)=>`<div class="p-3 glass rounded flex justify-between text-[10px] font-bold uppercase"><span>${c.team} wants ${c.player}</span><button onclick="state.claims.splice(${i},1); render();">✕</button></div>`).join('') : '<p class="text-center text-slate-700 italic text-xs">None</p>';
            document.getElementById('active-trades').innerHTML = state.trades.length ? state.trades.map((t,i)=>`<div class="p-4 glass border border-purple-500/30 rounded-2xl flex justify-between items-center text-[10px] font-black uppercase"><div>PROPOSAL: ${t.fromTeam} sends [${t.givePlayers.join(', ')}] for ${t.toTeam}'s ${t.wantPlayer}</div><div class="flex gap-2"><button onclick="acceptTrade(${i})" class="bg-green-600 px-4 py-2 rounded">Accept</button><button onclick="state.trades.splice(${i},1); render();">Decl</button></div></div>`).join('') : '';
            document.getElementById('trade-log').innerHTML = state.tradeLog.map(l => `<div class="p-2 border-b border-slate-800/30 font-mono text-[9px] text-slate-500 tracking-tighter">${l}</div>`).reverse().join('');
        }

        window.pSearch = () => {
            const v = document.getElementById('pSearch').value.toLowerCase(); if(!v) return document.getElementById('pResults').innerHTML = '';
            document.getElementById('pResults').innerHTML = players.filter(p=>p.name.toLowerCase().includes(v)).slice(0,10).map(p=>{ const o = state.teams.find(t => t.roster.some(r => r.name === p.name)); return `<div class="p-3 bg-slate-900 border border-slate-800 rounded flex justify-between items-center text-[11px] font-black uppercase font-black"><div>${p.name} <br><span class="text-[9px] ${o?'text-purple-400':'accent-green'}">${o?o.name:'Free Agent'}</span></div><button onclick="stageAdd('${p.name.replace("'","\\'")}')" class="bg-blue-600 px-3 py-1 rounded text-[9px]">STAGE</button></div>`; }).join('');
        };

        window.submitResult = async (tourney, tIdx, res, pts) => {
            const team = state.teams[tIdx]; if(!state.results[tourney]) state.results[tourney] = {};
            const old = state.results[tourney][tIdx];
            if(old === 'W') { team.w--; team.pts -= pts; }
            if(old === 'T') { team.t--; team.pts -= (pts/2); }
            if(old === 'L') { team.l--; }
            state.results[tourney][tIdx] = res;
            if(res === 'W') { team.w++; team.pts += pts; }
            if(res === 'L') { team.l++; }
            if(res === 'T') { team.t++; team.pts += (pts/2); }
            await pushState(); render();
        }

        window.adjustPoints = async (idx) => {
            const val = prompt("Deduct points:");
            if (val && !isNaN(val)) {
                state.teams[idx].pts -= parseFloat(val);
                state.tradeLog.push(`[${new Date().toLocaleDateString()}] ADJ: Commissioner deducted ${val} pts from ${state.teams[idx].name}`);
                await pushState(); render();
            }
        };

        window.addTeam = async () => {
            const name = prompt("Name:");
            if (name) {
                const nt = { id: Date.now(), name: name.trim(), roster: [], w:0, l:0, t:0, pts:0 };
                state.teams.push(nt); state.waiverOrder.push(nt.name);
                await pushState(); render();
            }
        };

        window.removeTeam = async (idx) => {
            if (confirm(`Remove?`)) {
                state.waiverOrder = state.waiverOrder.filter(n => n !== state.teams[idx].name);
                state.teams.splice(idx, 1);
                await pushState(); render();
            }
        };

        window.processWaivers = async () => {
            state.claims.sort((a,b) => state.waiverOrder.indexOf(a.team) - state.waiverOrder.indexOf(b.team));
            const taken = new Set();
            state.claims.forEach(c => {
                const team = state.teams.find(t => t.name === c.team);
                const golfer = players.find(p => p.name === c.player);
                if(!taken.has(c.player) && !state.teams.some(t => t.roster.some(r => r.name === c.player)) && (team?.roster || []).length < 6) {
                    team.roster.push(golfer); taken.add(c.player);
                    state.tradeLog.push(`[${new Date().toLocaleDateString()}] WAIVER: ${team.name} added ${c.player}`);
                    state.waiverOrder = state.waiverOrder.filter(n => n !== team.name).concat(team.name);
                }
            });
            state.claims = []; await pushState(); render();
        };

        window.toggleTradePlayer = (idx, name) => {
            if(!state.stagedAdds[idx].multiOffer) state.stagedAdds[idx].multiOffer = [];
            const pos = state.stagedAdds[idx].multiOffer.indexOf(name);
            if(pos === -1) state.stagedAdds[idx].multiOffer.push(name); else state.stagedAdds[idx].multiOffer.splice(pos, 1);
        };

        window.stageAdd = n => { const p = players.find(x=>x.name===n); if(!state.stagedAdds.some(a=>a.name===n)) state.stagedAdds.push({...p, multiOffer: []}); render(); };
        window.stageDrop = n => { const p = players.find(x=>x.name===n) || state.teams[state.activeTeamIdx].roster.find(x=>x.name===n); if(!state.stagedDrops.some(d=>d.name===n)) state.stagedDrops.push(p); render(); };

        window.submitMoves = async () => {
            const team = state.teams[state.activeTeamIdx];
            state.stagedDrops.forEach(d => { team.roster = team.roster.filter(p => p.name !== d.name); state.tradeLog.push(`[${new Date().toLocaleDateString()}] DROP: ${team.name} released ${d.name}`); });
            state.stagedAdds.forEach(p => {
                const owner = state.teams.find(t => t.roster.some(r => r.name === p.name));
                if(!owner) state.claims.push({team: team.name, player: p.name});
                else if(p.multiOffer?.length) state.trades.push({fromTeam: team.name, toTeam: owner.name, wantPlayer: p.name, givePlayers: [...p.multiOffer]});
            });
            state.stagedAdds = []; state.stagedDrops = []; await pushState(); render();
        };

        window.acceptTrade = async i => {
            const t = state.trades[i]; const t1 = state.teams.find(x=>x.name===t.fromTeam); const t2 = state.teams.find(x=>x.name===t.toTeam);
            const pWant = t2.roster.find(x=>x.name===t.wantPlayer); const pGives = t1.roster.filter(x => t.givePlayers.includes(x.name));
            t1.roster = t1.roster.filter(x => !t.givePlayers.includes(x.name)).concat(pWant); t2.roster = t2.roster.filter(x => x.name !== t.wantPlayer).concat(pGives);
            state.tradeLog.push(`[${new Date().toLocaleDateString()}] TRADE: ${t1.name} got ${t.wantPlayer} for ${t.givePlayers.join(' & ')}`);
            state.trades.splice(i,1); await pushState(); render();
        };

        window.manualWaiverOrder = async () => {
            const val = prompt("Waiver Order:", state.waiverOrder.join(", "));
            if (val) { state.waiverOrder = val.split(",").map(p => p.trim()); await pushState(); render(); }
        };

        window.renameTeam = async idx => {
            const val = prompt("New name:", state.teams[idx].name);
            if(val) {
                const old = state.teams[idx].name; state.teams[idx].name = val;
                state.waiverOrder = state.waiverOrder.map(n => n === old ? val : n);
                await pushState(); render();
            }
        };

        window.clearHistory = async () => { if(confirm("Clear?")) { state.tradeLog = []; await pushState(); render(); } };
        window.switchTab = id => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('tab-active'));
            document.getElementById('tab-'+id).classList.add('active');
            document.getElementById('btn-'+id).classList.add('tab-active');
        };

        window.onload = fetchState;
    </script>
</body>
</html>
