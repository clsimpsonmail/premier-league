            document.getElementById('directory-body').innerHTML = players.filter(p => p.name.toLowerCase().includes(q)).map(p => {
                const owner = state.teams.find(t => t.roster.some(r => r.name === p.name));
                return `<tr class="border-b border-slate-800 hover:bg-slate-900/50"><td class="p-4 text-[10px] text-slate-500 font-mono">#${p.rank}</td><td class="p-4 font-black uppercase text-sm">${p.name}${p.tour==='LIV'?' - LIV':''}</td><td class="p-4 text-right accent-green font-mono">$${(p.price/1000000).toFixed(1)}M</td><td class="p-4 text-right pr-8"><span class="px-2 py-1 rounded text-[9px] font-black uppercase ${owner?'bg-purple-900 text-purple-400':'bg-green-900 text-green-400'}">${owner?owner.name:'Free Agent'}</span></td></tr>`;
            }).join('');

            // MY TEAM VIEW
            document.getElementById('team-nav').innerHTML = state.teams.map((t, i) => `<button onclick="state.activeTeamIdx=${i}; state.stagedAdds=[]; state.stagedDrops=[]; render();" class="px-4 py-2 rounded-lg border ${state.activeTeamIdx===i?'border-green-500 bg-green-500/10 text-white':'border-slate-800'} font-black text-[10px] uppercase transition-all">${t.name}</button>`).join('');
            const active = state.teams[state.activeTeamIdx];
            if(active) {
                const cur = active.roster.reduce((a,b)=>a+b.price,0);
                const proj = cur + state.stagedAdds.reduce((a,b)=>a+b.price,0) - state.stagedDrops.reduce((a,b)=>a+b.price,0);
                document.getElementById('active-team-view').innerHTML = `
                <div class="lg:col-span-2 space-y-6">
                    <div class="glass p-8 rounded-3xl border-t-4 border-accent-purple">
                        <div class="flex justify-between items-end mb-8"><div><h3 onclick="renameTeam(${state.activeTeamIdx})" class="text-3xl font-black italic cursor-pointer tracking-tighter">${active.name} ✎</h3></div><div class="text-right text-xl font-black ${proj>100000000?'text-red-500':'accent-green'}">$${(proj/1000000).toFixed(1)}M / 100M</div></div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">${active.roster.map(p => `<div class="p-4 bg-slate-900 border ${state.stagedDrops.some(d=>d.name===p.name)?'border-red-500 opacity-30':'border-slate-800'} rounded-xl flex justify-between items-center font-black uppercase"><span class="text-xs">${p.name}${p.tour==='LIV'?' - LIV':''}</span><div class="flex items-center gap-4"><span class="text-[10px] accent-green font-mono">$${(p.price/1000000).toFixed(1)}M</span><button onclick="stageDrop('${p.name.replace("'","\\'")}')" class="text-red-500 text-[10px] hover:underline">DROP</button></div></div>`).join('')}</div>
                    </div>
                    <div class="glass p-8 rounded-3xl"><input type="text" id="pSearch" onkeyup="pSearch()" placeholder="Find Pro to Add or Trade..."> <div id="pResults" class="mt-4 space-y-2"></div></div>
                </div>
                <div class="glass p-8 rounded-3xl h-fit border border-slate-700 sticky top-8 shadow-2xl">
                    <h4 class="text-xs uppercase text-slate-500 mb-6 font-black tracking-widest italic">Move Request Queue</h4>
                    <div class="space-y-3 mb-8">
                        ${state.stagedAdds.map((p,i)=> {
                            const owner = state.teams.find(t => t.roster.some(r => r.name === p.name));
                            return owner ? `<div class="p-3 bg-purple-500/10 border-l-4 border-purple-500 rounded text-[10px] font-black space-y-2 uppercase"><div>TRADE: ${owner.name} <button onclick="state.stagedAdds.splice(${i},1); render();">✕</button></div><div>GET: ${p.name}</div><div>GIVING: ${active.roster.map(rp=>`<div><input type="checkbox" onchange="toggleTradePlayer(${i},'${rp.name}')"> ${rp.name}</div>`).join('')}</div></div>` : `<div class="p-2 bg-green-500/10 border-l-4 border-green-500 rounded text-[10px] font-black flex justify-between uppercase tracking-tighter">WAIVER ADD: ${p.name} <button onclick="state.stagedAdds.splice(${i},1); render();">✕</button></div>`
                        }).join('')}
                        ${state.stagedDrops.map((p,i)=>`<div class="p-2 bg-red-500/10 border-l-4 border-red-500 rounded text-[10px] font-black flex justify-between uppercase tracking-tighter">LINKED DROP: ${p.name} <button onclick="state.stagedDrops.splice(${i},1); render();">✕</button></div>`).join('')}
                    </div>
                    <button onclick="submitMoves()" class="w-full py-4 bg-green-600 rounded-xl font-black text-xs uppercase shadow-lg hover:bg-green-500">Submit to Queue</button>
                </div>`;
            }

            document.getElementById('waiver-order').innerHTML = state.waiverOrder.map((n,i)=>`<div class="p-3 bg-slate-900 border border-slate-800 rounded-xl flex justify-between text-[11px] font-black uppercase">#${i+1} <span>${n}</span></div>`).join('');
            document.getElementById('claims-list').innerHTML = state.claims.map((c,i)=>`<div class="p-3 glass rounded flex justify-between text-[10px] font-bold uppercase"><span>${c.team} wants ${c.player} (If successful, drops: ${c.linkedDrops.join(',')})</span><button onclick="state.claims.splice(${i},1); render();">✕</button></div>`).join('');
            document.getElementById('active-trades').innerHTML = state.trades.map((t,i)=>`<div class="p-4 glass border border-purple-500 rounded-2xl flex justify-between items-center text-[10px] font-black uppercase"><div>OFFER: ${t.fromTeam} sends [${t.givePlayers.join(', ')}] for ${t.toTeam}'s ${t.wantPlayer}</div><div class="flex gap-2"><button onclick="acceptTrade(${i})" class="bg-green-600 px-3 py-1 rounded">Accept</button><button onclick="state.trades.splice(${i},1); render();">Decl</button></div></div>`).join('');
            document.getElementById('trade-log').innerHTML = state.tradeLog.map(l => `<div class="p-2 border-b border-slate-800/30 font-mono text-[9px] text-slate-500 tracking-tighter">${l}</div>`).reverse().join('');
        }

        // BUG FIX 1 & 6: CAP PREVENTION ON SUBMIT
        window.submitMoves = async () => {
            const team = state.teams[state.activeTeamIdx];
            const net = state.stagedAdds.reduce((a,b)=>a+b.price,0) - state.stagedDrops.reduce((a,b)=>a+b.price,0);
            const currentSpent = team.roster.reduce((a,b)=>a+b.price,0);
            if((currentSpent + net) > 100000000) return alert("Request puts team over Cap");

            if(state.stagedAdds.length === 0 && state.stagedDrops.length > 0) {
                if(!confirm(`Confirm instant drop of ${state.stagedDrops.map(d=>d.name).join(', ')}?`)) return;
                state.stagedDrops.forEach(d => { team.roster = team.roster.filter(p => p.name !== d.name); state.tradeLog.push(`[${new Date().toLocaleDateString()}] DROP: ${team.name} released ${d.name}`); });
            } else {
                state.stagedAdds.forEach(p => {
                    const owner = state.teams.find(t => t.roster.some(r => r.name === p.name));
                    if(!owner) state.claims.push({ team: team.name, player: p.name, linkedDrops: state.stagedDrops.map(d=>d.name) });
                    else if(p.multiOffer?.length) state.trades.push({ fromTeam: team.name, toTeam: owner.name, wantPlayer: p.name, givePlayers: [...p.multiOffer] });
                });
            }
            state.stagedAdds = []; state.stagedDrops = []; await pushState(); render();
        };

        // BUG FIX 1: MAJOR vs NON-MAJOR POINTS (W=3/6, T=1.5/3, L=0)
        window.submitResult = async (tourney, tIdx, res, basePts) => {
            if(!state.results[tourney]) state.results[tourney] = {};
            const old = state.results[tourney][tIdx];
            if(old === 'W') state.teams[tIdx].pts -= basePts;
            if(old === 'T') state.teams[tIdx].pts -= (basePts / 2);
            state.results[tourney][tIdx] = res;
            if(res === 'W') state.teams[tIdx].pts += basePts;
            if(res === 'T') state.teams[tIdx].pts += (basePts / 2);
            await pushState(); render();
        };

        window.processWaivers = async () => {
            if(!confirm("Process all pending claims?")) return;
            state.claims.sort((a,b) => state.waiverOrder.indexOf(a.team) - state.waiverOrder.indexOf(b.team));
            state.claims.forEach(c => {
                const team = state.teams.find(t => t.name === c.team);
                if(!state.teams.some(t => t.roster.some(r => r.name === c.player))) {
                    c.linkedDrops.forEach(ld => { team.roster = team.roster.filter(rp => rp.name !== ld); });
                    team.roster.push(players.find(p=>p.name===c.player));
                    state.tradeLog.push(`[${new Date().toLocaleDateString()}] WAIVER: ${team.name} added ${c.player}`);
                    state.waiverOrder = state.waiverOrder.filter(n => n !== team.name).concat(team.name);
                }
            });
            state.claims = []; await pushState(); render();
        };

        // BUG FIX 4: TRADE BUTTON TROUBLESHOOTING
        window.acceptTrade = async (i) => {
            const t = state.trades[i];
            const tFrom = state.teams.find(x => x.name === t.fromTeam);
            const tTo = state.teams.find(x => x.name === t.toTeam);
            if(!tFrom || !tTo) return alert("Team lookup failed");
            
            // Swap Want Player
            tTo.roster = tTo.roster.filter(p => p.name !== t.wantPlayer);
            tFrom.roster.push(players.find(p => p.name === t.wantPlayer));
            
            // Swap Give Players
            t.givePlayers.forEach(gn => {
                tFrom.roster = tFrom.roster.filter(p => p.name !== gn);
                tTo.roster.push(players.find(p => p.name === gn));
            });

            state.tradeLog.push(`[${new Date().toLocaleDateString()}] TRADE: ${t.fromTeam} & ${t.toTeam} swapped players`);
            state.trades.splice(i,1); await pushState(); render();
        }

        window.pSearch = () => {
            const v = document.getElementById('pSearch').value.toLowerCase();
            if(!v) return document.getElementById('pResults').innerHTML = '';
            document.getElementById('pResults').innerHTML = players.filter(p=>p.name.toLowerCase().includes(v)).slice(0,5).map(p=>{
                return `<div class="p-3 bg-slate-900 border border-slate-800 rounded flex justify-between items-center text-[10px] font-black uppercase"><div>${p.name}${p.tour==='LIV'?' - LIV':''}<br><span class="text-[8px] accent-green font-mono">$${(p.price/1000000).toFixed(1)}M</span></div><button onclick="stageAdd('${p.name.replace("'","\\'")}')" class="bg-blue-600 px-3 py-1 rounded text-[8px]">STAGE</button></div>`;
            }).join('');
        };

        window.manualWaiverOrder = async () => {
            const val = prompt("Enter CSV Order:", state.waiverOrder.join(", "));
            if(val) { state.waiverOrder = val.split(",").map(s => s.trim()); await pushState(); render(); }
        };

        window.adjustPoints = async (idx) => { const val = prompt("Manual Adj:"); if(val && !isNaN(val)) { state.teams[idx].pts += parseFloat(val); await pushState(); render(); } };
        window.renameTeam = async (idx) => { const val = prompt("New Name:", state.teams[idx].name); if(val) { const old = state.teams[idx].name; state.teams[idx].name = val; state.waiverOrder = state.waiverOrder.map(n => n === old ? val : n); await pushState(); render(); } };
        window.toggleTradePlayer = (idx, name) => { if(!state.stagedAdds[idx].multiOffer) state.stagedAdds[idx].multiOffer = []; const pos = state.stagedAdds[idx].multiOffer.indexOf(name); if(pos === -1) state.stagedAdds[idx].multiOffer.push(name); else state.stagedAdds[idx].multiOffer.splice(pos, 1); };
        window.stageAdd = n => { const p = players.find(x=>x.name===n); if(!state.stagedAdds.some(a=>a.name===n)) state.stagedAdds.push({...p, multiOffer: []}); render(); };
        window.stageDrop = n => { const p = players.find(x=>x.name===n) || state.teams[state.activeTeamIdx].roster.find(x=>x.name===n); if(!state.stagedDrops.some(d=>d.name===n)) state.stagedDrops.push(p); render(); };
        window.switchTab = id => { document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('tab-active')); document.getElementById('tab-'+id).classList.add('active'); document.getElementById('btn-'+id).classList.add('tab-active'); };
        
        window.onload = fetchState;
    </script>
</body>
</html>
